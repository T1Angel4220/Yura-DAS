<header class="app-header" *ngIf="isLoggedIn()">
  <div class="app-title">♻️ Yura PWA</div>
  <button class="btn btn-primary" style="padding: 6px 12px; width: auto; font-size: 0.85rem; box-shadow: none;" (click)="logout()">Salir</button>
</header>

<main style="padding-bottom: 80px;">
  <router-outlet></router-outlet>
</main>

<nav class="bottom-nav" *ngIf="isLoggedIn()">
  <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
    <div class="nav-icon">🏠</div>
    Inicio
  </a>
  <a routerLink="/guide" routerLinkActive="active" class="nav-item">
    <div class="nav-icon">📖</div>
    Guía
  </a>
  <a routerLink="/calendar" routerLinkActive="active" class="nav-item">
    <div class="nav-icon">📅</div>
    Calendario
  </a>
</nav>
